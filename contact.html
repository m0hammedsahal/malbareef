<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Contact — MALBA_REE | Hyderabad</title>
<meta name="description" content="Visit, call or message MALBA_REE in Hyderabad. We'd love to hear from you."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Caveat+Brush&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="siteHeader"></div>

<section class="hero-sub">
  <div class="hero-bg"></div>
  <div class="sunburst"></div>
  <div class="container-sm" style="position:relative">
    <p class="eyebrow">Say hello</p>
    <h1>Contact MALBA_REE</h1>
    <p>We'd love to hear from you — for orders, feedback, partnerships or just a chat.</p>
  </div>
</section>

<section class="section">
  <div class="container contact-grid">
    <div>
      <div class="contact-card"><div class="card-icon">📍</div><div><div class="t">Visit us</div><div class="d">Hyderabad, Telangana, India</div></div></div>
      <div class="contact-card"><div class="card-icon">📞</div><div><div class="t">Call</div><div class="d">+91 85938 21281</div></div></div>
      <div class="contact-card"><div class="card-icon">✉️</div><div><div class="t">Email</div><div class="d">hello@malbaree.in</div></div></div>
      <div class="contact-card"><div class="card-icon">💬</div><div><div class="t">WhatsApp</div><div class="d">Tap the floating button</div></div></div>
      <div class="map-wrap"><iframe title="MALBA_REE Hyderabad" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3806.3812481175887!2d78.35521207316162!3d17.441457283454934!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bcb930bb6e4f9db%3A0xa1e6a605c691874e!2sMalbaree!5e0!3m2!1sen!2sin!4v1784031341325!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin" loading="lazy"></iframe></div>
    </div>

    <form class="form-inner" style="border:1px solid rgba(255,214,0,.4);box-shadow:var(--shadow-soft);border-radius:32px" data-toast="Thanks! We'll reply soon.">
      <h2 class="section-title" style="font-size:32px;margin-bottom:24px">Send a message</h2>
      <div class="field" style="margin-bottom:16px"><label>Your name</label><input name="name" required></div>
      <div class="field" style="margin-bottom:16px"><label>Email</label><input name="email" type="email" required></div>
      <div class="field" style="margin-bottom:16px"><label>Subject</label><input name="subject" required></div>
      <div class="field" style="margin-bottom:20px"><label>Message</label><textarea name="message" rows="5" required></textarea></div>
      <button class="btn btn-red" type="submit" style="width:100%;justify-content:center;padding:14px">Send message</button>
    </form>
  </div>
</section>

<div id="siteFooter"></div>
<script src="script.js"></script>
</body>
</html>
